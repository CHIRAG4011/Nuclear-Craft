# NuclearCraft Boss Configuration

plutonium-titan:
  enabled: true

  spawning:
    spawn-item: titan-core
    spawn-altar: true
    altar-materials:
      - OBSIDIAN
      - CRYING_OBSIDIAN
    cooldown-minutes: 60
    announce-radius: 500
    announcement: "<dark_red>☢ THE PLUTONIUM TITAN HAS BEEN AWAKENED! ☢</dark_red>"

  stats:
    health: 2000.0
    damage: 15.0
    armor: 10.0
    armor-toughness: 4.0
    speed: 0.22
    follow-range: 80.0
    knockback-resistance: 1.0

  phases:
    phase-1:
      hp-threshold: 1.0
      speed-multiplier: 1.0
      damage-multiplier: 1.0
    phase-2:
      hp-threshold: 0.6
      speed-multiplier: 1.2
      damage-multiplier: 1.3
      enrage-message: "<red>☢ The Titan grows more powerful!</red>"
    phase-3:
      hp-threshold: 0.25
      speed-multiplier: 1.5
      damage-multiplier: 1.7
      enrage-message: "<dark_red>☢ CRITICAL PHASE — THE TITAN RAGES!</dark_red>"

  abilities:
    radiation-burst:
      enabled: true
      cooldown-ticks: 60
      radius: 12.0
      exposure: 50.0
      particle: EXPLOSION_LARGE
    zombie-summon:
      enabled: true
      cooldown-ticks: 200
      count: 5
    ground-slam:
      enabled: true
      cooldown-ticks: 100
      radius: 8.0
      damage: 20.0
      knockback: 3.0

  rewards:
    xp: 5000
    items:
      - item: titan-core
        chance: 1.0
        min: 1
        max: 2
      - item: refined-plutonium-ingot
        chance: 1.0
        min: 8
        max: 16
      - item: irradiated-heart
        chance: 0.5
        min: 1
        max: 3
    broadcast-kill: true
    kill-message: "<gradient:#39ff14:#00ff88>{player} has slain the Plutonium Titan!</gradient>"

  particles:
    idle:
      type: SPELL_MOB
      count: 20
      interval-ticks: 5
    death:
      type: EXPLOSION_HUGE
      count: 30
