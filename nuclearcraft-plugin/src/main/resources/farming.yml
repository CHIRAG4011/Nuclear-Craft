# NuclearCraft Phase 7 — Radioactive Farming & Cure System Configuration

radioactive-farming:
  enabled: true

# ── Mutated Seed & Planting ────────────────────────────────────────────────────
seed:
  # Only Radioactive Farmland is valid; attempting to plant elsewhere shows the
  # wrong-farmland message and cancels the placement.
  valid-surface: radioactive-farmland

# ── Plant Growth ───────────────────────────────────────────────────────────────
plant:
  # Total growth stages: 0 (seed) → 4 (mature blossom)
  # Growth stages are driven by vanilla random-tick BlockGrowEvents — no tick scanning.
  max-stage: 4

  # Radioactive Farmland gives a bonus chance to grow an extra stage per tick.
  farmland-growth-bonus: 0.50

  # Bone meal is allowed by vanilla mechanics (no override needed).

  # Chance of a fully-grown crop mutating into a Toxic Bloom instead (0.0 – 1.0)
  toxic-bloom-chance: 0.01

  harvest:
    petals-min: 1
    petals-max: 3
    seeds-min: 0
    seeds-max: 2
    xp-min: 2
    xp-max: 5

# ── Toxic Bloom ────────────────────────────────────────────────────────────────
toxic-bloom:
  # How often to irradiate nearby players (ticks)
  radiation-interval-ticks: 40
  # Radiation points applied each interval
  radiation-amount: 8
  # Radius (blocks) in which players are irradiated
  radius: 4.0

# ── Radiation Cure System ─────────────────────────────────────────────────────
cure:
  antidote:
    # Antidote clears all radiation, infection, and debuffs.
    # Does NOT grant immunity.
    enabled: true

  serum:
    # Serum clears all radiation and grants temporary immunity.
    enabled: true
    # Duration of immunity granted by the serum (minutes)
    immunity-duration-minutes: 10

# ── Healing Petal (direct consume, legacy) ────────────────────────────────────
healing-petal:
  # Direct consumption effect when right-clicked (not used for crafting removal)
  consume-effect: REGENERATION
  consume-amplifier: 1
  consume-duration: 100
  radiation-reduction: 25.0

# ── Statistics (all tracked per-player in database) ───────────────────────────
statistics:
  track:
    - seeds_planted
    - plants_harvested
    - healing_petals_collected
    - antidotes_crafted
    - serums_crafted
    - radiation_cures_used
    - toxic_blooms_generated

# ── Farmland Radiation (retained from Phase 6 for compatibility) ──────────────
farmland:
  radiation:
    passive-exposure: 1.0
    exposure-interval-ticks: 40
  particles:
    enabled: true
    interval-ticks: 20

# ── Crop Boosts (retained for compatibility) ──────────────────────────────────
crop-boosts:
  enabled: true
  growth-multiplier: 1.5
  mutation-chance: 0.10

# ── Particle Settings ─────────────────────────────────────────────────────────
particles:
  harvest:
    enabled: true
  toxic-bloom:
    enabled: true
