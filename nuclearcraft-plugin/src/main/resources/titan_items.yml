# ═══════════════════════════════════════════════════════════════════
# NuclearCraft: Plutonium Age — Phase 11: Titan Technology System
# titan_items.yml — All Titan Technology Configuration
# ═══════════════════════════════════════════════════════════════════

# ── Titan Reactor Forge Machine ─────────────────────────────────────
titan-forge:
  tick-period: 4
  max-energy: 15000.0
  energy-per-core: 5000.0
  energy-decay-per-tick: 0.5
  overload-cooldown-ticks: 400
  overload-burst-radius: 10.0
  overload-burst-amount: 300
  gui-title: "§5☢ Titan Reactor Forge ☢"
  gui-refresh-ticks: 10

# ── Titan Armor Per-Piece Effects ───────────────────────────────────
armor:
  effect-interval-ticks: 40
  helmet:
    night-vision: true
  chestplate:
    regeneration: true
    max-health-bonus: 4.0   # extra hearts (+4 = +8 HP)
  leggings:
    speed: true
    knockback-resistance: true
  boots:
    jump-boost: true
    fall-damage-immunity: true

# ── Full Set Bonus ───────────────────────────────────────────────────
set-bonus:
  effect-interval-ticks: 40
  health-bonus: 8.0         # extra hearts (+8 = +16 HP total with chestplate)
  radiation-immune: true    # full radiation immunity
  radiation-reflect-enabled: true
  radiation-reflect-percent: 30.0
  auto-cure-interval-ticks: 400
  speed-amplifier: 1        # Speed II
  jump-amplifier: 1         # Jump Boost II

# ── Titan Weapons ────────────────────────────────────────────────────
weapons:
  sword:
    radiation-on-hit: 80
    wave-radius: 4.0
    wave-radiation: 40
    crit-chance: 15.0
  axe:
    radiation-on-hit: 60
    shockwave-radius: 5.0
    knockback-multiplier: 2.0
  bow:
    arrow-radiation: 120
    aoe-radiation: 60
    aoe-radius: 3.0
    poison-duration-ticks: 100
    glow-duration-ticks: 120
  pickaxe:
    mining-speed-multiplier: 2.5
    bonus-ore-yield-chance: 30.0   # % chance for double drop
  shovel:
    area-radius: 2
  hoe:
    area-radius: 3
    growth-boost-chance: 40.0

# ── Titan Aura ───────────────────────────────────────────────────────
aura:
  interval-ticks: 40
  radius: 5.0
  mob-weakness-duration: 60
  mob-slowness-duration: 60
  mob-damage: 2.0
  pvp-radiation: 15
  pvp-enabled: true

# ── Titan Repair ─────────────────────────────────────────────────────
repair:
  fragment-repair-percent: 20.0  # % durability per Titan Fragment
  core-repair-percent: 50.0      # % durability per Titan Core

