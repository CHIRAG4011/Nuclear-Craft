# NuclearCraft Resource Pack Configuration
# Phase 12 — v1.0

resource-pack:
  # Set to true to enable automatic resource pack delivery on player join.
  # You must host the pack at a public URL (e.g. a direct download link).
  enabled: false

  # Direct download URL to the compiled NuclearCraft resource pack (.zip).
  # Must be a publicly accessible HTTPS link.
  url: ""

  # SHA-1 hash of the pack file (40 hex characters).
  # Used by the client to verify the download and skip re-downloading when unchanged.
  # Generate with: sha1sum NuclearCraft-ResourcePack.zip
  hash: "0d2ad1ddcda701ad9c031bd5b99acfebe8ecd186"

  # If true, players who decline the pack are kicked from the server.
  required: false

  # Message shown to players when prompted to download the pack.
  prompt: "NuclearCraft requires a resource pack for custom item models and sounds."

  # Log pack acceptance / rejection status to console.
  log-status: true

sounds:
  # Master volume multiplier (0.0 - 2.0). Applies to all NuclearCraft sounds.
  master-volume: 1.0

  # Master pitch multiplier (0.5 - 2.0).
  master-pitch: 1.0

