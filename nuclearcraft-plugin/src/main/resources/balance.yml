# NuclearCraft Balance Configuration
# Phase 13 — v1.1
#
# All numerical gameplay values are centralised here.
# Change these to tune the server experience without touching code.
# Use /nc reload to apply changes at runtime.

# ─── Radiation ────────────────────────────────────────────────────────────────
radiation:
  # Points lost per server tick (20 ticks/second) when not in a radiation source.
  decay-rate-per-tick: 0.05

  # Radiation gained when mining plutonium ore without a Radiation Drill.
  ore-mining-gain: 25.0

  # Radiation gained per hit from an Irradiated Zombie.
  zombie-hit-gain: 15.0

  # Radiation spread per tick to nearby unprotected players (contagion).
  contagion-rate: 5.0

  # Number of Healing Petals consumed per Antidote craft.
  antidote-petal-cost: 8

  # Number of Antidotes consumed per Serum craft.
  serum-craft-cost: 4

  # Stage thresholds (0–1000 scale).
  stage-thresholds:
    stage-1: 100    # Mild exposure — subtle effects
    stage-2: 300    # Moderate exposure
    stage-3: 500    # Serious exposure
    stage-4: 750    # Severe exposure
    stage-5: 950    # Critical / near death

  # ── Phase 13: Enforcement ─────────────────────────────────────────────────

  # Maximum radiation that a single event can apply.
  # Prevents one-tick spikes from instantly killing players.
  max-gain-per-event: 100.0

  # Minimum ticks between contagion applications to the same player (prevents spam).
  contagion-cooldown-ticks: 40

  # Maximum contagion spread range in blocks.
  contagion-max-range: 5.0

  # Ticks after consuming a cure before radiation can rise above the grace threshold.
  post-cure-grace-ticks: 600

  # Radiation level (pts) above which gains are blocked during post-cure grace.
  post-cure-grace-threshold: 50.0

# ─── Zombies ─────────────────────────────────────────────────────────────────
zombies:
  irradiated:
    health: 30.0
    damage: 6.0

  alpha:
    health: 80.0
    damage: 12.0
    glow-radius: 8

  # Chance that a natural zombie spawn is replaced with an Irradiated Zombie.
  spawn-chance: 0.10

  # Multiplier applied to spawn chance during Radiation Night.
  night-spawn-multiplier: 3

# ─── Ore ─────────────────────────────────────────────────────────────────────
ore:
  vein-size: 3
  veins-per-chunk: 1
  min-y: -64
  max-y: -20

  # Fraction of radiation gain removed when mining with a Radiation Drill (0–1).
  drill-radiation-reduction: 0.75

# ─── Machines ────────────────────────────────────────────────────────────────
machines:
  smelter:
    # Ticks to process one ore fragment (200 ticks = 10 seconds).
    process-ticks: 200

    # Radiation leaked to nearby players per tick while the smelter runs.
    radiation-per-tick: 0.5

    fuel:
      coal: 800
      blaze-rod: 1200
      lava-bucket: 2000

  forge:
    energy-capacity: 1000

    energy-cost:
      mk1: 100
      mk2: 250
      mk3: 500
      mk4: 1000

    # Probability of a successful upgrade (0.0–1.0).
    success-chance:
      mk1: 0.90
      mk2: 0.75
      mk3: 0.60
      mk4: 0.40

# ─── Equipment ───────────────────────────────────────────────────────────────
equipment:
  plutonium:
    sword-damage: 9.0
    pickaxe-speed: 8.0
    armor-toughness: 2.0

  hazmat:
    # Fraction of incoming radiation blocked (0 = no protection, 1 = full immunity).
    radiation-resistance: 0.75

  plutonium-armor:
    radiation-resistance: 0.50

# ─── Farming ─────────────────────────────────────────────────────────────────
farming:
  # Bonus growth chance per tick for mutated crops (additive to base rate).
  mutated-crop-growth-bonus: 0.5

  # Chance per tick that a Toxic Bloom spreads to an adjacent block.
  toxic-bloom-spread-chance: 0.15

  # Radius in blocks that a Toxic Bloom can spread.
  toxic-bloom-radius: 3

  # Radiation added per tick to players standing on Radioactive Farmland.
  farmland-radiation-per-tick: 1.0

  # Healing Petals required to craft one Antidote.
  antidote-petal-count: 8

  # Duration of immunity granted by a Radiation Serum (minutes).
  serum-immunity-minutes: 10

# ─── Combat ──────────────────────────────────────────────────────────────────
combat:
  # Multiplier applied to radiation level when converting to bonus PvP damage.
  radiation-damage-multiplier: 0.5

  # Probability of applying radiation infection on each melee hit.
  infection-on-hit-chance: 0.10

  # Radius of AOE radiation effects from Titan weapons (blocks).
  aoe-radius: 4.0

  mastery-max-level: 10
  mastery-kills-per-level: 50

  # ── Phase 13: PvP Caps ────────────────────────────────────────────────────

  # Maximum bonus damage from radiation per hit.
  # Prevents radiation alone from causing one-shots in PvP.
  max-radiation-damage-bonus: 15.0

  # Max times a single player can be infected per fight (resets on victim death).
  infection-stack-limit: 5

  # Contagion spread range in blocks.
  contagion-range: 5.0

  # Minimum ticks between contagion/aura applications to the same target.
  contagion-interval-ticks: 40

  # Maximum radiation gain per aura pulse to a single target per interval.
  max-aura-pulse-gain: 20.0

# ─── Boss — Plutonium Titan ──────────────────────────────────────────────────
boss:
  titan:
    base-health: 800.0

    # Multiplier on Titan damage (1.0 = normal, 1.5 = 50% harder).
    damage-scaling: 1.0

    radiation-aura-radius: 8.0
    radiation-aura-gain: 10.0

    # Health % thresholds at which the Titan transitions phases.
    phase2-health-percent: 75
    phase3-health-percent: 50
    phase4-health-percent: 25

    # Ticks between ability uses.
    ability-cooldown-ticks: 100

    # Maximum number of zombies the Titan can summon at once.
    max-summons: 6

    # ── Phase 13: Multiplayer Scaling ─────────────────────────────────────────

    # HP added per additional player beyond the first (up to max-players-for-scaling).
    health-per-extra-player: 100.0

    # Maximum player count used for health scaling.
    max-players-for-scaling: 10

    # Block radius to scan for players when Titan spawns (for health scaling).
    player-scan-radius: 80

    # Minimum player count to be considered a "group fight".
    group-fight-min-players: 3

    # Contribution thresholds (fraction of total damage dealt by a participant).
    contribution:
      tier-1-percent: 0.40    # Top contributor(s)
      tier-2-percent: 0.20    # Significant contributors
      tier-3-percent: 0.05    # Minor participants

    # Loot quantity multiplier per contribution tier.
    loot-multiplier:
      tier-1: 1.5             # Top contributors get 50% more drops
      tier-2: 1.2             # Significant contributors get 20% more
      tier-3: 1.0             # Minor participants get base drops

# ─── Titan Technology ─────────────────────────────────────────────────────────
titantech:
  set-bonus:
    # Full set bonus: radiation resistance fraction (1.0 = total immunity).
    radiation-resistance: 1.0

  titan-sword:
    base-damage: 20.0

  weapons:
    # Radiation added to the hit target per weapon strike.
    radiation-on-hit: 50.0

# ─── Economy Guards ───────────────────────────────────────────────────────────
economy:
  # Minimum minutes before the Titan can respawn after being killed.
  boss-respawn-cooldown-minutes: 60

  # Seconds of inactivity before AFK farming protections trigger.
  afk-farming-timeout-seconds: 300

  # Maximum number of machines a single player can own.
  max-machines-per-player: 5

  # Seconds between machine placements per player (anti-spam).
  machine-placement-cooldown-seconds: 5

  # Maximum Radioactive Cores a single player can hold (soft cap, informational).
  max-cores-per-player: 64

  # Maximum Titan loot grants per boss kill per player.
  max-titan-loots-per-kill: 1

  # Enable duplicate custom item detection.
  duplicate-detection: true

# ─── Loot Drop Rates ──────────────────────────────────────────────────────────
# Target economy:
#   Radioactive Core : ~1 per 15–20 zombie kills (Level 1)
#   Mutated Seed     : ~1 per 12–18 zombie kills (Level 1)
#   Irradiated Heart : ~1 per 100–150 zombie kills (Level 1)

loot:
  zombie:
    flesh-max: 3

    level-1:
      radioactive-core-chance: 0.06    # ~1 per 17 kills
      mutated-seed-chance:     0.07    # ~1 per 14 kills
      irradiated-heart-chance: 0.008   # ~1 per 125 kills

    level-2:
      radioactive-core-chance: 0.10    # ~1 per 10 kills
      mutated-seed-chance:     0.09    # ~1 per 11 kills
      irradiated-heart-chance: 0.010   # ~1 per 100 kills

    level-3:
      radioactive-core-chance: 0.15    # ~1 per 7 kills (alpha zombies)
      mutated-seed-chance:     0.12    # ~1 per 8 kills
      irradiated-heart-chance: 0.015   # ~1 per 67 kills

  titan:
    # Fragment range: uniform random between min and max.
    fragment-min: 8
    fragment-max: 16

    # Bonus fragments per contribution-tier-1 or tier-2 participant.
    bonus-fragment-per-contributor: 2

    # Drop chances (1.0 = guaranteed, 0.0 = never).
    titan-core-chance:         1.0
    reactor-heart-chance:      1.0
    ancient-blueprint-chance:  0.70
    mutated-crystal-chance:    0.50

  ore:
    # Base fragment count per ore block mined.
    fragment-base: 2

    # Bonus fragments per Fortune enchantment level.
    fortune-level1-bonus: 1    # Fortune I  → 3 total
    fortune-level2-bonus: 2    # Fortune II → 4 total
    fortune-level3-bonus: 3    # Fortune III → 5 total

# ─── Progression Targets ──────────────────────────────────────────────────────
# Expected real-world day ranges to reach each milestone (8 active hours/day).
# Used by ProgressionBalanceManager for rush detection and admin monitoring.

progression:
  log-milestones:          true
  rush-detection:          true
  rush-threshold-percent:  0.50   # Warn if reached in < 50% of expected min time

  milestones:
    first-zombie-kill:
      target-day-min: 1
      target-day-max: 1

    first-radioactive-core:
      target-day-min: 2
      target-day-max: 3

    first-plutonium-ore:
      target-day-min: 4
      target-day-max: 7

    first-radiation-drill-craft:
      target-day-min: 4
      target-day-max: 7

    first-nuclear-smelter-craft:
      target-day-min: 7
      target-day-max: 14

    first-plutonium-equipment:
      target-day-min: 10
      target-day-max: 18

    first-radioactive-farm:
      target-day-min: 12
      target-day-max: 20

    first-mk1-upgrade:
      target-day-min: 15
      target-day-max: 25

    first-titan-summon:
      target-day-min: 20
      target-day-max: 35

    first-titan-kill:
      target-day-min: 25
      target-day-max: 40

    first-titan-equipment:
      target-day-min: 35
      target-day-max: 50
