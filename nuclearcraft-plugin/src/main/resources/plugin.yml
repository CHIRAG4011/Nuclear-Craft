name: NuclearCraft
version: '${project.version}'
main: com.nuclearcraft.core.NuclearCraftPlugin
api-version: '1.21'
description: A nuclear-themed Minecraft plugin featuring radiation, plutonium, and boss encounters.
authors: [NuclearCraft Team]
website: https://github.com/nuclearcraft

load: STARTUP

prefix: NuclearCraft

commands:
  nuclearcraft:
    description: Main NuclearCraft command
    aliases: [nc, nuclear]
    usage: /nuclearcraft <subcommand>
    permission: nuclearcraft.use

permissions:
  nuclearcraft.use:
    description: Allows use of basic NuclearCraft commands (radiation check on self)
    default: true

  nuclearcraft.admin:
    description: Grants all NuclearCraft admin permissions
    default: op
    children:
      nuclearcraft.use: true
      nuclearcraft.reload: true
      nuclearcraft.debug: true
      nuclearcraft.give: true
      nuclearcraft.admin.radiation: true
      nuclearcraft.admin.zombies: true

  nuclearcraft.reload:
    description: Allows reloading NuclearCraft configuration
    default: op

  nuclearcraft.debug:
    description: Allows access to debug commands
    default: op

  nuclearcraft.give:
    description: Allows giving custom NuclearCraft items to players
    default: op

  nuclearcraft.admin.radiation:
    description: Allows admin-level radiation commands (add, remove, set, clear, check others)
    default: op

  nuclearcraft.admin.zombies:
    description: Allows admin-level zombie commands (spawn, stats, surge control)
    default: op
