# NuclearCraft — Plutonium Titan Configuration (Phase 10)

titan:
  enabled: true

  # ── Stats ────────────────────────────────────────────────────────────────
  stats:
    damage:        18.0
    speed:         0.22
    follow-range:  80.0
    melee-range:   3.5
    melee-interval-ticks: 24

  # ── Health Scaling by player count ──────────────────────────────────────
  scaling:
    hp-1-3:    5000.0
    hp-4-6:    6500.0
    hp-7-10:   8500.0
    hp-10plus: 10000.0

  # ── Phase Thresholds and Multipliers ────────────────────────────────────
  phases:
    phase-1:
      speed-multiplier:  1.00
      damage-multiplier: 1.00
    phase-2:
      speed-multiplier:  1.10
      damage-multiplier: 1.20
    phase-3:
      speed-multiplier:  1.25
      damage-multiplier: 1.50
    phase-4:
      speed-multiplier:  1.50
      damage-multiplier: 2.00

  # ── Summoning ────────────────────────────────────────────────────────────
  summoning:
    cooldown-minutes:  60
    animation-seconds: 15

  # ── Abilities ────────────────────────────────────────────────────────────
  abilities:

    radiation-aura:
      radius:         10.0
      radiation:       3.0
      interval-ticks:  20

    titan-slam:
      cooldown-ms:  10000
      radius:           5.0
      damage:           12.0

    radiation-wave:
      cooldown-ms:  15000
      radius:           20.0
      radiation:        40.0

    mutant-summon:
      cooldown-ms:  25000
      regular-count:    3
      alpha-count:      1

    reactor-overload:
      cooldown-ms:  40000
      radius:           18.0
      radiation:        70.0

    energy-beam:
      cooldown-ms:  20000
      damage:           25.0
      radiation:        60.0

    nuclear-catastrophe:
      cooldown-ms:      90000
      radius:           30.0
      radiation:        80.0
      min-survive-hp:   1.0

  # ── Arena ────────────────────────────────────────────────────────────────
  arena:
    hazard-radius:    15.0
    hazard-radiation:  2.0

  # ── Boss Bar ─────────────────────────────────────────────────────────────
  bossbar:
    title: "☢ PLUTONIUM TITAN ☢"
    visible-range: 120

  # ── Rewards ──────────────────────────────────────────────────────────────
  rewards:
    xp:                   5000
    kill-broadcast:       true
    kill-message:         "<gradient:#39ff14:#00ff88>{player} has slain the Plutonium Titan!</gradient>"
    reactor-heart-chance:         0.10
    blueprint-chance:             0.05
    mutated-crystal-chance:       0.08
