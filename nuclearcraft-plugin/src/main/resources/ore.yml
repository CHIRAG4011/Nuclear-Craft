# ============================================================
# NuclearCraft: Plutonium Age — Ore Configuration
# Phase 4: Plutonium Ore Generation, Mining & Radiation
# ============================================================

# ────────────────────────────────────────────────────────────
# PLUTONIUM ORE
# ────────────────────────────────────────────────────────────
plutonium-ore:
  enabled: true

  # World generation settings
  generation:
    # Overworld only (NORMAL environment)
    overworld-only: true

    # Y-level spawn range (deepest deepslate layer)
    # Spec: minimum -64, maximum -58, preferred -61
    min-y: -64
    max-y: -58

    # Chance per newly generated chunk that a vein spawns
    # ~0.60 = 40% rarer than diamonds at this depth
    spawn-chance-per-chunk: 0.60

    # Vein size bounds (blocks per vein)
    vein-size-min: 1
    vein-size-max: 2

    # Valid host materials (enforced in code — listed here for documentation)
    # host-materials: DEEPSLATE, STONE, COBBLED_DEEPSLATE, TUFF

  # Drop configuration
  drop:
    # Base fragments dropped per ore block (without Fortune)
    base-amount: 1

    # Fortune modifier caps
    # Fortune I:   1 – 2
    # Fortune II:  1 – 3
    # Fortune III: 1 – 4
    fortune-i-max: 2
    fortune-ii-max: 3
    fortune-iii-max: 4

    # XP dropped on successful mine
    xp-min: 3
    xp-max: 7

  # Passive radiation from nearby ore blocks
  # Applied every 5 seconds (100 ticks) to players in range
  radiation:
    # Chebyshev distance 1 block (1 block away or less)
    tier1-radiation: 5

    # Chebyshev distance 2 blocks
    tier2-radiation: 2

    # Chebyshev distance 3 blocks
    tier3-radiation: 1

    # Armor protection multipliers (fraction of radiation that passes through)
    hazmat-multiplier: 0.20    # 80% reduction
    plutonium-multiplier: 0.00 # 100% reduction (immune)

  # Mining settings
  mining:
    # Radiation burst when attempting to mine without a Radiation Drill
    burst-radiation: 25

    # Cooldown between burst applications (seconds)
    burst-cooldown-seconds: 5

  # Raw Plutonium Fragment radiation (when carried in inventory)
  fragment:
    # Base radiation gained every 30 seconds while holding fragments
    radiation-per-30s: 1.0

    # Whether radiation scales with the number of fragments carried
    # false = flat 1 rad/30s regardless of count
    # true  = 1 rad per fragment per 30s
    scale-by-count: false

  # Discovery notification range (blocks)
  discovery:
    detection-radius: 5

# ────────────────────────────────────────────────────────────
# RADIATION DRILL
# ────────────────────────────────────────────────────────────
radiation-drill:
  # Base material: DIAMOND_PICKAXE
  # Custom model data: 1108

  # Effective tool for Plutonium Ore
  mines-plutonium: true

  # Mining speed modifier over diamond pickaxe
  # 1.0 = same as diamond, 1.2 = 20% faster
  speed-modifier: 1.2

  # Durability (diamond pickaxe = 1561, netherite = 2031)
  durability: 1800

# ────────────────────────────────────────────────────────────
# LEAD-LINED STORAGE CRATE
# ────────────────────────────────────────────────────────────
lead-storage-crate:
  enabled: true

  # Whether fragments stored inside emit radiation to nearby players
  # false = no leak (the whole point of the crate)
  radiation-leak: false

  # Radiation range for NORMAL chests (not lead-lined)
  normal-chest-leak:
    enabled: true
    radius: 3
    radiation-per-10s: 1

# ────────────────────────────────────────────────────────────
# PLUTONIUM BLOCK
# ────────────────────────────────────────────────────────────
plutonium-block:
  # Crafted from 9 Refined Plutonium Ingots
  enabled: true

  # Radiation emitted to nearby players (higher than ore)
  radiation:
    tier1-radiation: 10  # ≤1 block
    tier2-radiation: 5   # ≤2 blocks
    tier3-radiation: 2   # ≤3 blocks

# ────────────────────────────────────────────────────────────
# RADIOACTIVE DEBRIS (existing — kept for compatibility)
# ────────────────────────────────────────────────────────────
radioactive-debris:
  enabled: true
  generation:
    min-y: -64
    max-y: -32
    rarity: 0.001
  drop:
    item: radioactive-core
    chance: 0.15
  radiation:
    passive-radius: 5
    exposure-rate: 0.5
