name: NuclearCraft
version: '${project.version}'
main: com.nuclearcraft.core.NuclearCraftPlugin
api-version: '1.21'
description: A nuclear-themed Minecraft plugin featuring radiation, plutonium, and boss encounters.
authors: [NuclearCraft Team]
website: https://github.com/nuclearcraft

load: STARTUP

prefix: NuclearCraft

commands:
  nuclearcraft:
    description: Main NuclearCraft command
    aliases: [nc, nuclear]
    usage: /nuclearcraft <subcommand>
    permission: nuclearcraft.use

permissions:
  nuclearcraft.use:
    description: Allows use of basic NuclearCraft commands (radiation check on self)
    default: true

  nuclearcraft.admin:
    description: Grants all NuclearCraft admin permissions
    default: op
    children:
      nuclearcraft.use: true
      nuclearcraft.reload: true
      nuclearcraft.debug: true
      nuclearcraft.give: true
      nuclearcraft.admin.radiation: true
      nuclearcraft.admin.zombies: true
      nuclearcraft.admin.ore: true
      nuclearcraft.admin.smelter: true
      nuclearcraft.admin.equipment: true
      nuclearcraft.admin.farming: true
      nuclearcraft.admin.forge: true
      nuclearcraft.admin.combat: true
      nuclearcraft.admin.titan: true
      nuclearcraft.admin.debug: true

  nuclearcraft.reload:
    description: Allows reloading NuclearCraft configuration
    default: op

  nuclearcraft.debug:
    description: Allows access to debug commands
    default: op

  nuclearcraft.give:
    description: Allows giving custom NuclearCraft items to players
    default: op

  nuclearcraft.admin.radiation:
    description: Allows admin-level radiation commands (add, remove, set, clear, check others)
    default: op

  nuclearcraft.admin.zombies:
    description: Allows admin-level zombie commands (spawn, stats, surge control)
    default: op

  nuclearcraft.admin.ore:
    description: Allows admin-level ore commands (spawn plutonium ore, give fragments, view stats)
    default: op

  nuclearcraft.admin.smelter:
    description: Allows admin-level smelter commands (give smelter, view stats, debug machines)
    default: op

  nuclearcraft.admin.equipment:
    description: Allows admin-level equipment commands (give plutonium/hazmat items, view stats)
    default: op

  nuclearcraft.admin.farming:
    description: Allows admin-level farming commands (give seeds/cures, growall, view stats)
    default: op

  nuclearcraft.admin.forge:
    description: Allows admin-level forge commands (give forge, set energy, upgrade items, view stats)
    default: op

  nuclearcraft.admin.combat:
    description: Allows admin-level combat commands (view stats, mastery, radiation kills)
    default: op

  nuclearcraft.admin.titan:
    description: Allows admin-level Titan commands (spawn, kill, phase, stats)
    default: op

  nuclearcraft.admin.debug:
    description: Allows access to /nc debug <system> diagnostic subcommands
    default: op
